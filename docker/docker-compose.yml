version: "3.9"

services:
  solomon-claw:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: solomon-claw
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: ../.env
    environment:
      - NODE_ENV=production
      - CONFIG_PATH=/data/config.json
      - DATABASE_URL=/data/solomon-claw.db
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
